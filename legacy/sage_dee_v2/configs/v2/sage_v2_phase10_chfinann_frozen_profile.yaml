version: v2-phase10-chfinann-frozen-profile-0.1
phase10:
  phase9_source_profile: DuEE-Fin frozen profile
  phase9_source_aggregate: /data/TJK/DEE/sage-dee/runs/phase9_duee_fin_main_table.json
  phase6_runs_root: /data/TJK/DEE/sage-dee/runs
  train_reused_from_phase6: true
  train_used: false
  full_train_used: false
  test_blocked: true
  no_chfinann_tuning: true
  limit50_predict_docs: 50
  full_dev_predict_docs: null
  preferred_gpu: "3"
  auto_select_idle_gpu: true
  idle_memory_mb: 1024
  idle_utilization_pct: 15
  seed_matrix:
    S1:
    - 42
    - 43
    S2:
    - 42
    - 43
    S4:
    - 42
    - 43
    - 44
run:
  profile: phase10_s4_role_safe_surface_memory
  dry_run: true
  real_run: false
data:
  dataset: ChFinAnn
  data_root: data
  train_split: train
  predict_split: dev
  max_train_docs: 0
  max_predict_docs: 50
getm:
  backend: qwen
  output_format: minimal_text
  prompt:
    baseline_mode: role_safe_surface_memory
    max_surface_candidates: 10
    candidate_context_chars: 0
    candidate_render_mode: compact
    enable_candidate_filtering: true
    max_candidates_per_type: 6
    dedupe_surface_candidates: true
    drop_low_value_company_fragments: true
    prompt_token_budget: 4096
    fail_on_prompt_token_limit: false
  qwen:
    base_model: Qwen/Qwen3-4B-Instruct-2507
    model_path: /data/TJK/DEE/models/Qwen/Qwen3-4B-Instruct-2507
    adapter_path: null
    quantization: 4-bit NF4
    double_quantization: true
    compute_dtype: bf16
    lora:
      rank: 16
      alpha: 32
      dropout: 0.05
      target_modules:
      - q_proj
      - k_proj
      - v_proj
      - o_proj
    training:
      num_train_epochs: 1
      learning_rate: 0.0002
      logging_steps: 5
      optimizer: paged_adamw_8bit
      micro_batch_size: 1
      gradient_accumulation: 16
      max_seq_len: 4096
      gradient_checkpointing: true
      max_train_steps: null
  generation:
    k_candidates: 1
    max_new_tokens: 1024
    do_sample: false
    temperature: null
    top_p: 1.0
    seed: 42
    deterministic: true
    deterministic_warn_only: true
    record_resolved_generation_config: true
    repetition_penalty: 1.05
    use_chat_template: true
    use_response_prefix: true
    response_prefix: '{"events":'
    enable_balanced_json_stopping: true
    stop_after_balanced_events_json: true
    prompt_delimiter: "### RESPONSE_JSON"
predict:
  dataset: ChFinAnn
  split: dev
  data_root: data
  max_predict_docs: 50
profiles:
  phase10_s1_direct_json:
    phase6_source_profile: phase6_s1_direct_json
    run:
      profile: phase10_s1_direct_json
      dry_run: false
      real_run: false
    getm:
      prompt:
        baseline_mode: direct_json
        max_surface_candidates: 0
        enable_candidate_filtering: false
        max_candidates_per_type: null
        dedupe_surface_candidates: false
        drop_low_value_company_fragments: false
      generation:
        do_sample: false
        temperature: null
        top_p: 1.0
        deterministic: true
        deterministic_warn_only: true
        record_resolved_generation_config: true
    data:
      max_train_docs: 0
      max_predict_docs: 50
    predict:
      max_predict_docs: 50
  phase10_s2_schema_only:
    phase6_source_profile: phase6_s2_schema_only
    run:
      profile: phase10_s2_schema_only
      dry_run: false
      real_run: false
    getm:
      prompt:
        baseline_mode: schema_only
        max_surface_candidates: 0
        enable_candidate_filtering: false
        max_candidates_per_type: null
        dedupe_surface_candidates: false
        drop_low_value_company_fragments: false
      generation:
        do_sample: false
        temperature: null
        top_p: 1.0
        deterministic: true
        deterministic_warn_only: true
        record_resolved_generation_config: true
    data:
      max_train_docs: 0
      max_predict_docs: 50
    predict:
      max_predict_docs: 50
  phase10_s4_role_safe_surface_memory:
    phase6_source_profile: phase6_s4_role_safe_surface_memory
    run:
      profile: phase10_s4_role_safe_surface_memory
      dry_run: false
      real_run: false
    getm:
      prompt:
        baseline_mode: role_safe_surface_memory
      generation:
        do_sample: false
        temperature: null
        top_p: 1.0
        deterministic: true
        deterministic_warn_only: true
        record_resolved_generation_config: true
    data:
      max_train_docs: 0
      max_predict_docs: 50
    predict:
      max_predict_docs: 50
resource_monitor:
  enabled: true
  sample_interval_sec: 1.0
  vram_soft_limit_gb: 23.0
  vram_target_min_gb: 20.0
  vram_target_max_gb: 23.0
  fail_on_vram_limit: false
training_budget:
  max_seq_len: 4096
  micro_batch_size: 1
  gradient_accumulation_steps: 16
  max_train_steps: null
