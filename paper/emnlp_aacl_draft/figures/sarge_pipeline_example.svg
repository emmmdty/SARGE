<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
<path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
</marker>
</defs>
<rect width="980" height="420" fill="white"/>
<text x="490" y="38" text-anchor="middle" font-size="21" font-weight="700" font-family="Arial, Helvetica, sans-serif" fill="#1f2937">From long announcement to role-safe event records</text>
<rect x="35" y="90" width="250" height="210" rx="7" fill="#f8fafc" stroke="#64748b" stroke-width="1.6"/>
<text x="160" y="115" text-anchor="middle" font-size="16" font-weight="700" font-family="Arial, Helvetica, sans-serif" fill="#1f2937">Input document</text>
<text x="53" y="145" text-anchor="start" font-size="13" font-weight="400" font-family="Arial, Helvetica, sans-serif" fill="#1f2937">sentence 1: pledge notice</text>
<text x="53" y="167" text-anchor="start" font-size="13" font-weight="400" font-family="Arial, Helvetica, sans-serif" fill="#1f2937">sentence 4: 11.97M shares</text>
<text x="53" y="189" text-anchor="start" font-size="13" font-weight="400" font-family="Arial, Helvetica, sans-serif" fill="#1f2937">sentence 7: holding ratio</text>
<text x="53" y="211" text-anchor="start" font-size="13" font-weight="400" font-family="Arial, Helvetica, sans-serif" fill="#1f2937">sentence 10: release date</text>
<text x="53" y="233" text-anchor="start" font-size="13" font-weight="400" font-family="Arial, Helvetica, sans-serif" fill="#1f2937">multiple homogeneous records</text>
<rect x="365" y="90" width="250" height="210" rx="7" fill="#eef2ff" stroke="#6478d3" stroke-width="1.6"/>
<text x="490" y="115" text-anchor="middle" font-size="16" font-weight="700" font-family="Arial, Helvetica, sans-serif" fill="#1f2937">Grounded prompt</text>
<text x="383" y="145" text-anchor="start" font-size="13" font-weight="400" font-family="Arial, Helvetica, sans-serif" fill="#1f2937">Event type: EquityPledge</text>
<text x="383" y="167" text-anchor="start" font-size="13" font-weight="400" font-family="Arial, Helvetica, sans-serif" fill="#1f2937">Roles: pledger, shares, date...</text>
<text x="383" y="189" text-anchor="start" font-size="13" font-weight="400" font-family="Arial, Helvetica, sans-serif" fill="#1f2937">Surface candidates &lt;= 40</text>
<text x="383" y="211" text-anchor="start" font-size="13" font-weight="400" font-family="Arial, Helvetica, sans-serif" fill="#1f2937">Amounts and dates kept verbatim</text>
<text x="383" y="233" text-anchor="start" font-size="13" font-weight="400" font-family="Arial, Helvetica, sans-serif" fill="#1f2937">Instruction: output JSON only</text>
<rect x="695" y="90" width="250" height="210" rx="7" fill="#edf7f5" stroke="#3b8c84" stroke-width="1.6"/>
<text x="820" y="115" text-anchor="middle" font-size="16" font-weight="700" font-family="Arial, Helvetica, sans-serif" fill="#1f2937">Validated output</text>
<text x="713" y="145" text-anchor="start" font-size="13" font-weight="400" font-family="Arial, Helvetica, sans-serif" fill="#1f2937">{"events": [ ... ]}</text>
<text x="713" y="167" text-anchor="start" font-size="13" font-weight="400" font-family="Arial, Helvetica, sans-serif" fill="#1f2937">schema-valid rate = 1.0</text>
<text x="713" y="189" text-anchor="start" font-size="13" font-weight="400" font-family="Arial, Helvetica, sans-serif" fill="#1f2937">parse failures = 0</text>
<text x="713" y="211" text-anchor="start" font-size="13" font-weight="400" font-family="Arial, Helvetica, sans-serif" fill="#1f2937">invalid roles = 0</text>
<text x="713" y="233" text-anchor="start" font-size="13" font-weight="400" font-family="Arial, Helvetica, sans-serif" fill="#1f2937">anchor-safe records</text>
<path d="M285,195 L365,195" fill="none" stroke="#374151" stroke-width="1.8" marker-end="url(#arrow)"/>
<path d="M615,195 L695,195" fill="none" stroke="#374151" stroke-width="1.8" marker-end="url(#arrow)"/>
<text x="490" y="345" text-anchor="middle" font-size="14" font-weight="600" font-family="Arial, Helvetica, sans-serif" fill="#1f2937">The model selects and organizes document-visible spans instead of freely inventing role values.</text>
<text x="490" y="372" text-anchor="middle" font-size="12" font-weight="400" font-family="Arial, Helvetica, sans-serif" fill="#1f2937">Seed-extension and backend-cross-check diagnostics remain separated from the main comparison rows.</text>
</svg>